<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgia dell'Avventuriero — Compendio D&D 5e</title>

  <!-- Tailwind CSS (Play CDN: nessun build necessario) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: '#0b0a10',
            obsidian: '#13111c',
            panel: '#1b1726',
            panel2: '#241f33',
            edge: '#352c4a',
            gold: '#d9b65f',
            goldsoft: '#b89544',
            crimson: '#9b2226',
            parchment: '#ece5d3',
            muted: '#9b94ac'
          },
          fontFamily: {
            display: ['Cinzel', 'Georgia', 'serif'],
            body: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <!-- Font (con fallback se offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    body {
      background-color: #0b0a10;
      background-image:
        radial-gradient(1200px 600px at 80% -10%, rgba(155, 34, 38, 0.16), transparent 60%),
        radial-gradient(900px 500px at 0% 0%, rgba(217, 182, 95, 0.10), transparent 55%),
        linear-gradient(180deg, #0b0a10 0%, #0e0c15 100%);
      background-attachment: fixed;
    }
    .font-display { font-family: 'Cinzel', Georgia, serif; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #13111c; }
    ::-webkit-scrollbar-thumb { background: #352c4a; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a3e63; }

    .card-rise { transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
    .card-rise:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,.45); }

    .tab-active { color: #0b0a10; background: linear-gradient(180deg, #e6c96f, #c9a64a); box-shadow: 0 6px 18px rgba(217,182,95,.25); }

    .drawer { transition: transform .28s cubic-bezier(.22,.61,.36,1); }
    .drawer-closed { transform: translateX(105%); }
    .overlay { transition: opacity .25s ease; }

    .fade-in { animation: fadeIn .25s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .chip { transition: background-color .12s ease, color .12s ease, border-color .12s ease; }

    /* Bordo a sinistra colorato per rarità/scuola, impostato via style inline */
    .accent-left { border-left-width: 4px; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>

<body class="font-body text-parchment min-h-screen antialiased">

  <!-- HEADER -->
  <header class="sticky top-0 z-30 backdrop-blur-md bg-ink/80 border-b border-edge/70">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4 flex-wrap">
      <div class="flex items-center gap-3 mr-auto">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-gold to-goldsoft flex items-center justify-center text-ink font-display font-bold text-xl shadow-lg select-none">&amp;</div>
        <div>
          <h1 id="app-title" class="font-display text-xl sm:text-2xl font-bold tracking-wide leading-none text-parchment"></h1>
          <p id="app-subtitle" class="text-xs text-muted mt-0.5"></p>
        </div>
      </div>
      <nav id="tabs" class="flex gap-1 p-1 rounded-xl bg-panel/70 border border-edge/60" role="tablist"></nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- PANEL: OGGETTI -->
    <section id="panel-items" data-panel="items">
      <div class="mb-4 flex flex-col gap-3">
        <div class="flex items-center gap-3 flex-wrap">
          <h2 id="items-title" class="font-display text-lg text-gold"></h2>
          <span id="items-count" class="text-xs text-muted"></span>
        </div>
        <input id="items-search" type="search" autocomplete="off"
          class="w-full rounded-lg bg-panel border border-edge px-4 py-2.5 text-parchment placeholder-muted focus:outline-none focus:border-gold/70 focus:ring-1 focus:ring-gold/40" />
        <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-rarity"></label>
            <div id="items-rarity" class="flex flex-wrap gap-1.5"></div>
          </div>
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-type"></label>
            <div id="items-type" class="flex flex-wrap gap-1.5"></div>
          </div>
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-att"></label>
            <div id="items-att" class="flex flex-wrap gap-1.5"></div>
          </div>
        </div>
        <div>
          <button id="items-reset" class="text-xs text-muted hover:text-gold underline underline-offset-2"></button>
        </div>
      </div>
      <div id="items-results" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
      <p id="items-empty" class="hidden text-center text-muted py-16"></p>
    </section>

    <!-- PANEL: INCANTESIMI -->
    <section id="panel-spells" data-panel="spells" class="hidden">
      <div class="mb-4 flex flex-col gap-3">
        <div class="flex items-center gap-3 flex-wrap">
          <h2 id="spells-title" class="font-display text-lg text-gold"></h2>
          <span id="spells-count" class="text-xs text-muted"></span>
        </div>
        <input id="spells-search" type="search" autocomplete="off"
          class="w-full rounded-lg bg-panel border border-edge px-4 py-2.5 text-parchment placeholder-muted focus:outline-none focus:border-gold/70 focus:ring-1 focus:ring-gold/40" />
        <div class="grid gap-3 lg:grid-cols-2">
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-class"></label>
            <select id="spells-class" class="w-full rounded-lg bg-panel border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70"></select>
          </div>
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-school"></label>
            <div id="spells-school" class="flex flex-wrap gap-1.5"></div>
          </div>
        </div>
        <div>
          <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-level"></label>
          <div id="spells-level" class="flex flex-wrap gap-1.5"></div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <span class="text-[11px] uppercase tracking-wider text-muted mr-1" id="lbl-comp"></span>
          <div id="spells-comp" class="flex flex-wrap gap-1.5"></div>
          <div id="spells-flags" class="flex flex-wrap gap-1.5 ml-auto"></div>
        </div>
        <div>
          <button id="spells-reset" class="text-xs text-muted hover:text-gold underline underline-offset-2"></button>
        </div>
      </div>
      <div id="spells-results" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
      <p id="spells-empty" class="hidden text-center text-muted py-16"></p>
    </section>

    <!-- PANEL: ASSISTENTE -->
    <section id="panel-assistant" data-panel="assistant" class="hidden">
      <h2 id="assistant-title" class="font-display text-lg text-gold mb-2"></h2>
      <p id="assistant-intro" class="text-sm text-muted mb-4 max-w-2xl"></p>
      <div class="grid gap-6 lg:grid-cols-5">
        <form id="assistant-form" class="lg:col-span-2 rounded-xl bg-panel border border-edge p-4 flex flex-col gap-4 self-start">
          <div>
            <label class="block text-xs uppercase tracking-wider text-muted mb-1" id="lbl-a-class"></label>
            <select id="a-class" class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70"></select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-muted mb-1" id="lbl-a-subclass"></label>
            <input id="a-subclass" type="text" class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-gold/70" />
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-muted mb-1" id="lbl-a-level"></label>
            <input id="a-level" type="number" min="1" max="20" value="5" class="w-28 rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70" />
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-muted mb-2" id="lbl-a-abilities"></label>
            <div id="a-abilities" class="grid grid-cols-3 gap-2"></div>
          </div>
          <button id="a-generate" type="submit" class="mt-1 rounded-lg bg-gradient-to-b from-gold to-goldsoft text-ink font-semibold py-2.5 hover:brightness-105 active:brightness-95 transition"></button>
        </form>

        <div id="assistant-results" class="lg:col-span-3">
          <p id="assistant-empty" class="text-center text-muted py-16 rounded-xl border border-dashed border-edge"></p>
        </div>
      </div>
    </section>

    <!-- PANEL: BUILD -->
    <section id="panel-build" data-panel="build" class="hidden">
      <h2 id="build-title" class="font-display text-lg text-gold mb-2"></h2>
      <p id="build-intro" class="text-sm text-muted mb-5 max-w-2xl"></p>

      <div class="grid gap-6 lg:grid-cols-5 items-start">
        <!-- Colonna sinistra: crea + elenco build salvate -->
        <div class="lg:col-span-2 flex flex-col gap-4">
          <form id="build-form" class="rounded-xl bg-panel border border-edge p-4 flex flex-col gap-3">
            <h3 id="build-new-title" class="font-display text-base text-parchment"></h3>
            <div>
              <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-build-name"></label>
              <input id="build-name" type="text" autocomplete="off"
                class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-gold/70" />
            </div>
            <div>
              <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-build-class"></label>
              <select id="build-class" class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70"></select>
            </div>
            <button id="build-create" type="submit"
              class="rounded-lg bg-gradient-to-b from-gold to-goldsoft text-ink font-semibold py-2 hover:brightness-105 active:brightness-95 transition"></button>
          </form>

          <div class="rounded-xl bg-panel border border-edge p-4">
            <div class="flex items-center justify-between gap-3 mb-3">
              <h3 id="build-saved-title" class="font-display text-base text-parchment"></h3>
              <span id="build-count" class="text-xs text-muted"></span>
            </div>
            <div id="build-list" class="flex flex-col gap-2"></div>
            <p id="build-saved-empty" class="text-center text-muted py-6 text-sm"></p>
          </div>
        </div>

        <!-- Colonna destra: editor della build attiva + assistente -->
        <div class="lg:col-span-3">
          <p id="build-editor-empty" class="text-center text-muted py-16 rounded-xl border border-dashed border-edge"></p>
          <div id="build-editor" class="hidden flex-col gap-4"></div>
        </div>
      </div>
    </section>

    <!-- PANEL: DM -->
    <section id="panel-dm" data-panel="dm" class="hidden">
      <h2 id="dm-title" class="font-display text-lg text-gold mb-2"></h2>
      <p id="dm-intro" class="text-sm text-muted mb-5 max-w-2xl"></p>

      <!-- Tracker dei mostri -->
      <div class="rounded-xl bg-panel border border-edge p-4 mb-6">
        <h3 id="dm-tracker-title" class="font-display text-base text-parchment mb-1"></h3>
        <p id="dm-tracker-hint" class="text-xs text-muted mb-3"></p>
        <form id="dm-monster-form" class="grid gap-3 sm:grid-cols-12 sm:items-end">
          <div class="sm:col-span-5">
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-name"></label>
            <input id="dm-name" type="text" autocomplete="off"
              class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-gold/70" />
          </div>
          <div class="sm:col-span-3">
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-hp"></label>
            <input id="dm-hp" type="number" min="1" inputmode="numeric"
              class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-gold/70" />
          </div>
          <div class="sm:col-span-2">
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-qty"></label>
            <input id="dm-qty" type="number" min="1" max="20" value="1" inputmode="numeric"
              class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70" />
          </div>
          <div class="sm:col-span-2">
            <button id="dm-add" type="submit"
              class="w-full rounded-lg bg-gradient-to-b from-gold to-goldsoft text-ink font-semibold py-2 hover:brightness-105 active:brightness-95 transition"></button>
          </div>
        </form>

        <!-- Aggiunta personaggi (PG) per l'iniziativa -->
        <form id="dm-pc-form" class="mt-3 grid gap-3 sm:grid-cols-12 sm:items-end border-t border-edge/60 pt-3">
          <p id="dm-pc-add-title" class="sm:col-span-12 text-[11px] uppercase tracking-wider text-indigo-300/90"></p>
          <div class="sm:col-span-7">
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-pc-name"></label>
            <input id="dm-pc-name" type="text" autocomplete="off"
              class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-indigo-400/70" />
          </div>
          <div class="sm:col-span-3">
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-pc-init"></label>
            <input id="dm-pc-init" type="number" inputmode="numeric"
              class="w-full rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment placeholder-muted focus:outline-none focus:border-indigo-400/70" />
          </div>
          <div class="sm:col-span-2">
            <button id="dm-pc-add" type="submit"
              class="w-full rounded-lg bg-gradient-to-b from-indigo-400 to-indigo-500 text-ink font-semibold py-2 hover:brightness-105 active:brightness-95 transition"></button>
          </div>
        </form>

        <div class="mt-3 flex items-center justify-between gap-3 flex-wrap">
          <span id="dm-monster-count" class="text-xs text-muted"></span>
          <button id="dm-clear" class="text-xs text-muted hover:text-crimson underline underline-offset-2"></button>
        </div>

        <!-- Barra combattimento / iniziativa -->
        <div id="dm-combat" class="mt-3 hidden">
          <button id="dm-combat-start"
            class="w-full sm:w-auto rounded-lg border border-indigo-400/60 bg-indigo-500/10 text-indigo-200 font-semibold px-4 py-2 hover:bg-indigo-500/20 transition"></button>
          <div id="dm-combat-panel" class="hidden flex-wrap items-center gap-3 rounded-lg border border-indigo-400/50 bg-indigo-500/10 px-4 py-3">
            <span id="dm-combat-info" class="font-display text-indigo-100"></span>
            <div class="ml-auto flex gap-2">
              <button id="dm-combat-next"
                class="rounded-lg bg-gradient-to-b from-indigo-400 to-indigo-500 text-ink font-semibold px-4 py-2 hover:brightness-105 transition"></button>
              <button id="dm-combat-end"
                class="rounded-lg border border-edge text-muted hover:text-crimson px-3 py-2 transition"></button>
            </div>
          </div>
        </div>

        <div id="dm-monster-list" class="mt-3 grid gap-3"></div>
        <p id="dm-monster-empty" class="text-center text-muted py-10"></p>
      </div>

      <!-- Mostri iconici pronti da aggiungere -->
      <div class="rounded-xl bg-panel border border-edge p-4 mb-6">
        <h3 id="dm-quick-title" class="font-display text-base text-parchment mb-1"></h3>
        <p id="dm-quick-hint" class="text-xs text-muted mb-3"></p>
        <div id="dm-quick-list" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Generatore di nomi per PNG -->
      <div class="rounded-xl bg-panel border border-edge p-4 mb-8">
        <h3 id="dm-names-title" class="font-display text-base text-parchment mb-1"></h3>
        <p id="dm-names-hint" class="text-xs text-muted mb-3"></p>
        <div class="flex flex-wrap items-end gap-3">
          <div>
            <label class="block text-[11px] uppercase tracking-wider text-muted mb-1" id="lbl-dm-names-kind"></label>
            <select id="dm-name-kind" class="rounded-lg bg-panel2 border border-edge px-3 py-2 text-parchment focus:outline-none focus:border-gold/70"></select>
          </div>
          <button id="dm-name-gen"
            class="rounded-lg bg-gradient-to-b from-gold to-goldsoft text-ink font-semibold px-4 py-2 hover:brightness-105 active:brightness-95 transition"></button>
        </div>
        <div id="dm-name-out" class="mt-3 flex flex-wrap gap-2"></div>
      </div>

      <!-- Tabelle e regole di riferimento -->
      <h3 id="dm-ref-title" class="font-display text-base text-gold mb-3"></h3>
      <div id="dm-reference" class="grid gap-3 lg:grid-cols-2 items-start"></div>
    </section>

    <!-- PANEL: NOVITÀ / PATCH NOTES -->
    <section id="panel-patch" data-panel="patch" class="hidden">
      <h2 id="patch-title" class="font-display text-lg text-gold mb-2"></h2>
      <p id="patch-intro" class="text-sm text-muted mb-5 max-w-2xl"></p>
      <div id="patch-list" class="flex flex-col gap-4"></div>
      <p id="patch-empty" class="hidden text-center text-muted py-16"></p>
    </section>
  </main>

  <footer class="max-w-6xl mx-auto px-4 py-8 text-center text-xs text-muted/70">
    <p>Contenuti basati sull'SRD 5.1 (licenza open). App stand-alone: apri <code class="text-gold/80">index.html</code> in qualsiasi browser. Nessuna installazione richiesta.</p>
  </footer>

  <!-- DRAWER DI DETTAGLIO -->
  <div id="overlay" class="overlay fixed inset-0 z-40 bg-black/60 opacity-0 pointer-events-none"></div>
  <aside id="drawer" class="drawer drawer-closed fixed top-0 right-0 z-50 h-full w-full max-w-md bg-obsidian border-l border-edge shadow-2xl overflow-y-auto">
    <div class="sticky top-0 bg-obsidian/95 backdrop-blur border-b border-edge px-5 py-3 flex items-center justify-between">
      <span id="drawer-eyebrow" class="text-xs uppercase tracking-widest text-muted"></span>
      <button id="drawer-close" class="w-8 h-8 rounded-lg border border-edge text-muted hover:text-parchment hover:border-gold/60 flex items-center justify-center text-lg leading-none">&times;</button>
    </div>
    <div id="drawer-body" class="p-5"></div>
  </aside>

  <!-- DATI E LOGICA (ordine importante) -->
  <script>
  /* ===== src/core/constants.js ===== */
/*
 * constants.js — Enumerazioni condivise (rarità, scuole, classi, ecc.)
 * Pattern UMD-lite: funziona sia nel browser (window.DND) sia in Node (require).
 */
(function (root, factory) {
  'use strict';
  var mod = factory();
  if (typeof module !== 'undefined' && module.exports) { module.exports = mod; }
  if (root) { root.DND = root.DND || {}; Object.assign(root.DND, mod); }
})(typeof globalThis !== 'undefined' ? globalThis : this, function () {
  'use strict';

  // Rarità in ordine crescente di potenza. `order` serve per il gating per livello.
  var RARITIES = [
    { id: 'common',    label: 'Comune',      order: 0, color: '#9ca3af' },
    { id: 'uncommon',  label: 'Non comune',  order: 1, color: '#22c55e' },
    { id: 'rare',      label: 'Raro',        order: 2, color: '#3b82f6' },
    { id: 'very-rare', label: 'Molto raro',  order: 3, color: '#a855f7' },
    { id: 'legendary', label: 'Leggendario', order: 4, color: '#f59e0b' },
    { id: 'artifact',  label: 'Artefatto',   order: 5, color: '#ef4444' }
  ];

  var ITEM_TYPES = [
    { id: 'weapon',   label: 'Arma' },
    { id: 'armor',    label: 'Armatura' },
    { id: 'shield',   label: 'Scudo' },
    { id: 'wondrous', label: 'Oggetto meraviglioso' },
    { id: 'ring',     label: 'Anello' },
    { id: 'rod',      label: 'Bacchetta da combattimento' },
    { id: 'staff',    label: 'Bastone' },
    { id: 'wand',     label: 'Bacchetta' },
    { id: 'potion',   label: 'Pozione' },
    { id: 'scroll',   label: 'Pergamena' }
  ];

  var SCHOOLS = [
    { id: 'abjuration',     label: 'Abiurazione' },
    { id: 'conjuration',    label: 'Evocazione (Conjuration)' },
    { id: 'divination',     label: 'Divinazione' },
    { id: 'enchantment',    label: 'Ammaliamento' },
    { id: 'evocation',      label: 'Invocazione (Evocation)' },
    { id: 'illusion',       label: 'Illusione' },
    { id: 'necromancy',     label: 'Necromanzia' },
    { id: 'transmutation',  label: 'Trasmutazione' }
  ];

  // role: martial | skirmisher | hybrid | caster
  var CLASSES = [
    { id: 'barbarian', label: 'Barbaro',    caster: false, role: 'martial',    castingAbility: null,  primary: ['str', 'con'] },
    { id: 'bard',      label: 'Bardo',      caster: true,  role: 'caster',     castingAbility: 'cha', primary: ['cha', 'dex'] },
    { id: 'cleric',    label: 'Chierico',   caster: true,  role: 'caster',     castingAbility: 'wis', primary: ['wis'] },

/*
 * util.js — Funzioni di utilita condivise (normalizzazione testo, escape HTML).
 */
(function (root, factory) {
  'use strict';
  var mod = factory();
  if (typeof module !== 'undefined' && module.exports) { module.exports = mod; }
  if (root) { root.DND = root.DND || {}; Object.assign(root.DND, mod); }
})(typeof globalThis !== 'undefined' ? globalThis : this, function () {
  'use strict';

  // Range dei segni diacritici combinanti (U+0300..U+036F), costruito da stringa ASCII.
  var COMBINING_MARKS = new RegExp('[\\u0300-\\u036f]', 'g');

  // Minuscolo + rimozione accenti: "Pozione" trova "pozione", "elfico" trova la voce accentata.
  function normalize(text) {
    if (text === null || text === undefined) { return ''; }
    return String(text)
      .toLowerCase()
      .normalize('NFD')
      .replace(COMBINING_MARKS, '')
      .trim();
  }

  // Escape per inserire testo dei dati nell'HTML senza rischi di injection.
  function escapeHtml(text) {
    if (text === null || text === undefined) { return ''; }
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // true se `query` e contenuta in `haystack` (entrambe normalizzate).
  function matchesText(haystack, query) {
    var q = normalize(query);
    if (q === '') { return true; }
    return normalize(haystack).indexOf(q) !== -1;
  }

  return {
    normalize: normalize,
    escapeHtml: escapeHtml,
    matchesText: matchesText
  };
});

    'Thornwood', 'Ravenscar', 'Greycastle', 'Blackwood', 'Strongarm', 'Marlowe',
    'Brennan', 'Castagni', 'Falconeri', 'Lupieri'
  ];

  var tavern = [
    'Il Drago Dorato', 'La Rosa Nera', 'Il Boccale Schiumante', 'La Sirena Ubriaca',
    'Il Grifone Rampante', 'La Lanterna Verde', 'Il Cinghiale Bianco', 'La Corona Spezzata',
    "Il Calice d'Argento", 'La Volpe Astuta', 'Il Corvo e la Quercia', 'La Spada Arrugginita',
    'Il Pony Zoppo', 'La Luna Rossa', "Il Tridente d'Oro", 'La Botte Sfondata',
    "Il Lupo e l'Agnello", 'La Torre Pendente', 'Il Gatto Nero', 'La Rosa dei Venti',
    "Il Martello e l'Incudine", 'La Stella del Nord', 'Il Vecchio Faro', 'La Quercia Cava'
  ];

  var place = [
    'Valfonda', 'Pietraforte', 'Corvospino', 'Ponte Corvo', 'Roccabruna', 'Borgonebbia',
    'Lago Sereno', 'Colle del Vento', 'Selva Oscura', 'Riva Tetra', 'Montecupo', 'Fontechiara',
    'Vallenera', 'Capo Tempesta', 'Forte Aldano', 'Guado Lungo', 'Torre Spezzata', 'Acquaviva',
    'Pietralba', 'Castelgrigio', 'Solitaria', 'Verdivalle', 'Cima Ghiaccio', 'Porto Cenere'
  ];

  var pools = {
    maleGiven: maleGiven, femaleGiven: femaleGiven, surname: surname,
    tavern: tavern, place: place
  };

  var kinds = ['png', 'maschile', 'femminile', 'taverna', 'luogo'];

  // Sceglie un elemento dell'array usando l'RNG fornito (default Math.random),
  // restando sempre dentro i limiti anche se l'RNG restituisce 1.
  function pick(arr, rng) {
    var r = (typeof rng === 'function') ? rng : Math.random;
    var i = Math.floor(r() * arr.length);
    if (i < 0) { i = 0; }
    if (i >= arr.length) { i = arr.length - 1; }
    return arr[i];
  }

  function fullName(given, rng) {
    return pick(given, rng) + ' ' + pick(surname, rng);
  }

  // Genera un nome per la categoria richiesta:
  //   'maschile' | 'femminile' | 'png' (genere casuale) | 'taverna' | 'luogo'
  function generate(kind, rng) {
    switch (kind) {
      case 'maschile': return fullName(maleGiven, rng);
      case 'femminile': return fullName(femaleGiven, rng);
      case 'taverna': return pick(tavern, rng);
      case 'luogo': return pick(place, rng);
      case 'png':
      default:
        return fullName(pick([maleGiven, femaleGiven], rng), rng);
    }
  }

  // Genera `n` nomi (minimo 1) della categoria richiesta.
  function generateMany(n, kind, rng) {
    n = parseInt(n, 10);
    if (isNaN(n) || n < 1) { n = 1; }
    var out = [];
    for (var i = 0; i < n; i++) { out.push(generate(kind, rng)); }
    return out;
  }

  return {
    pools: pools,
    kinds: kinds,
    generate: generate,
    generateMany: generateMany
  };
});

  /* ===== src/core/builds.js ===== */
/*
 * builds.js — Logica pura per le build personalizzate dell'utente (niente DOM).
 * Crea/modifica build (nome, classe, oggetti, incantesimi) in modo immutabile e
 * le valuta con un assistente a regole. Nessuna dipendenza esterna: i dati
 * (oggetti, incantesimi, classi) arrivano via `ctx`, così la logica è testabile.
 * Pattern UMD-lite: nel browser espone DND.builds, in Node module.exports.
 */
(function (root, factory) {
  'use strict';
  var mod = factory();
  if (typeof module !== 'undefined' && module.exports) { module.exports = mod; }
  if (root) { root.DND = root.DND || {}; root.DND.builds = mod; }

  'use strict';

  var MAX_ATTUNEMENT = 3;
  // Slot che di norma si equipaggiano in un solo esemplare: i doppioni sono ridondanti.
  var UNIQUE_SLOTS = { armor: 1, shield: 1 };

  function str(v) { return (v === undefined || v === null) ? '' : String(v); }
  function trim(v) { return str(v).trim(); }

  // Lista di stringhe ripulite, senza vuoti né duplicati (mantiene l'ordine).
  function uniqueStrings(arr) {
    if (!Array.isArray(arr)) { return []; }
    var out = [], seen = {};
    for (var i = 0; i < arr.length; i++) {
      var s = trim(arr[i]);
      if (s && !seen[s]) { seen[s] = true; out.push(s); }
    }
    return out;
  }

  function assign(target) {
    for (var i = 1; i < arguments.length; i++) {
      var src = arguments[i];
      if (!src) { continue; }
      for (var k in src) { if (Object.prototype.hasOwnProperty.call(src, k)) { target[k] = src[k]; } }
    }
    return target;
  }

  var counter = 0;
  function uid() { counter += 1; return 'b' + Date.now().toString(36) + '-' + counter; }

  // Crea una build normalizzata. `opts`: id, itemIds, spellIds (usati anche al
  // ripristino da localStorage).
  function makeBuild(name, clazz, opts) {
    opts = opts || {};
    return {
      id: opts.id || uid(),
      name: trim(name) || 'Nuova build',
      clazz: trim(clazz),
      itemIds: uniqueStrings(opts.itemIds),
      spellIds: uniqueStrings(opts.spellIds)
    };
  }

  // Restituisce una NUOVA build con la lista `key` rimpiazzata (deduplicata).
  function withList(build, key, list) {
    var patch = {}; patch[key] = uniqueStrings(list);
    return assign({}, build, patch);
  }

  function addItem(build, id) {
    id = trim(id);
    if (!id) { return build; }
    return withList(build, 'itemIds', (build.itemIds || []).concat([id]));
  }
  function removeItem(build, id) {
    id = trim(id);
    return withList(build, 'itemIds', (build.itemIds || []).filter(function (x) { return x !== id; }));
  }
  function addSpell(build, id) {
    id = trim(id);
    if (!id) { return build; }
    return withList(build, 'spellIds', (build.spellIds || []).concat([id]));
  }
  function removeSpell(build, id) {
    id = trim(id);
    return withList(build, 'spellIds', (build.spellIds || []).filter(function (x) { return x !== id; }));
  }

    return assign({}, build, { name: trim(name) || build.name });
  }
  function setClass(build, clazz) {
    return assign({}, build, { clazz: trim(clazz) });
  }
  function hasItem(build, id) { return (build.itemIds || []).indexOf(trim(id)) !== -1; }
  function hasSpell(build, id) { return (build.spellIds || []).indexOf(trim(id)) !== -1; }

  // ---- Assistente: valutazione a regole -------------------------------------
  // ctx: { itemById, spellById, classById }. Restituisce un report con
  // punteggio 0-100, verdetto e liste di codici (warnings/suggestions/positives)
  // che la UI traduce in messaggi localizzati.
  function evaluateBuild(build, ctx) {
    ctx = ctx || {};
    build = build || {};
    var itemById = ctx.itemById || {};
    var spellById = ctx.spellById || {};
    var classById = ctx.classById || {};

    var items = (build.itemIds || []).map(function (id) { return itemById[id]; }).filter(Boolean);
    var spells = (build.spellIds || []).map(function (id) { return spellById[id]; }).filter(Boolean);
    var info = classById[build.clazz] || null;
    var isCaster = !!(info && info.caster);

    var warnings = [], suggestions = [], positives = [];

    // Build vuota: niente da valutare.
    if (items.length === 0 && spells.length === 0) {
      return {
        score: 0, verdict: 'empty', isCaster: isCaster,
        itemCount: 0, spellCount: 0, attunementUsed: 0, attunementMax: MAX_ATTUNEMENT,
        warnings: [], suggestions: [{ code: 'empty' }], positives: []
      };
    }

    var score = 100;

    // Budget di sintonia (max 3).
    var attuneUsed = 0;
    items.forEach(function (it) { if (it.attunement) { attuneUsed++; } });
    if (attuneUsed > MAX_ATTUNEMENT) {
      warnings.push({ code: 'attune-over', used: attuneUsed, max: MAX_ATTUNEMENT });
      score -= 12 * (attuneUsed - MAX_ATTUNEMENT);
    } else if (attuneUsed > 0) {
      positives.push({ code: 'attune-ok', used: attuneUsed, max: MAX_ATTUNEMENT });
    }

    // Doppioni di slot tipicamente unici (armatura, scudo).
    var typeCount = {};
    items.forEach(function (it) { typeCount[it.type] = (typeCount[it.type] || 0) + 1; });
    Object.keys(UNIQUE_SLOTS).forEach(function (type) {
      if ((typeCount[type] || 0) > 1) {
        warnings.push({ code: 'dup-slot', type: type, count: typeCount[type] });
        score -= 10;
      }
    });

    // Coerenza classe / incantesimi.
    if (info && !isCaster && spells.length > 0) {
      warnings.push({ code: 'noncaster-spells', clazz: build.clazz });
      score -= 12;
    }
    if (isCaster && spells.length === 0) {
      suggestions.push({ code: 'caster-no-spells', clazz: build.clazz });
      score -= 8;
    }
    if (isCaster && spells.length > 0) {
      var offClass = spells.filter(function (sp) { return (sp.classes || []).indexOf(build.clazz) === -1; });
      if (offClass.length > 0) {
        warnings.push({ code: 'spells-offclass', count: offClass.length });
        score -= 4 * offClass.length;
      } else {
        positives.push({ code: 'spells-onclass', count: spells.length });
      }
    }

    // Classe non scelta.
    if (!info) {
      suggestions.push({ code: 'no-class' });
      score -= 6;
    }

    // Nessun modo di attaccare: né arma né incantesimi.
    var hasWeapon = (typeCount['weapon'] || 0) > 0;
    if (!hasWeapon && spells.length === 0) {
      suggestions.push({ code: 'no-offense' });
      score -= 8;
    } else if (hasWeapon) {
      positives.push({ code: 'has-weapon' });
    }

    // Troppi oggetti di altissima potenza.
    var legendary = items.filter(function (it) { return it.rarity === 'legendary' || it.rarity === 'artifact'; }).length;
    if (legendary > 2) {
      warnings.push({ code: 'too-legendary', count: legendary });
      score -= 6;
    }

    if (score < 0) { score = 0; }
    if (score > 100) { score = 100; }
    var verdict = score >= 80 ? 'great' : (score >= 55 ? 'good' : 'review');

    return {
      score: score, verdict: verdict, isCaster: isCaster,
      itemCount: items.length, spellCount: spells.length,
      attunementUsed: attuneUsed, attunementMax: MAX_ATTUNEMENT,
      warnings: warnings, suggestions: suggestions, positives: positives
    };
  }

  return {
    MAX_ATTUNEMENT: MAX_ATTUNEMENT,
    makeBuild: makeBuild,
    addItem: addItem, removeItem: removeItem,
    addSpell: addSpell, removeSpell: removeSpell,
    rename: rename, setClass: setClass,
    hasItem: hasItem, hasSpell: hasSpell,
    evaluateBuild: evaluateBuild
  };
});

  function renderToggleGroup(container, options, set, onChange) {
    container.innerHTML = options.map(function (o) {

  // Gruppo a selezione singola (radio-like). options: [{id,label}], current via getter/setter.

  // ---- Tabs ----------------------------------------------------------------
  function initTabs() {
